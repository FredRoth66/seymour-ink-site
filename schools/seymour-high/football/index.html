<!DOCTYPE html>
<html>
<head>
  <title>Seymour High Football Merch — Seymour.Ink</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/products.js"></script>
  <script src="/logo-config.js"></script>
  <script type="module" src="/pricing.js"></script>
  <script type="module" src="/cart.js"></script>
</head>
<body onload="renderTeamPage()">

<header class="site-header">
  <a href="/" class="logo-link">
    <img src="/images/seymour-ink-logo.png" alt="Seymour.Ink" class="site-logo">
  </a>
  <nav class="site-nav">
    <a href="/">About</a>
    <a href="/search">Find Your School</a>
    <a href="/add-team">Add Your Team</a>
    <a href="/cart">Cart</a>
  </nav>
</header>

<main class="main-content">
  <section class="school-header">
    <img src="/schools/seymour-high/logo-football.png" alt="Seymour High Football Logo">
    <h1 id="teamTitle">Seymour High Football</h1>
    <p>Merchandise featuring this football logo.</p>
    <p id="victoryBadge" style="color:#c00;font-weight:600;" hidden>Victory Sale Pricing Active</p>
  </section>

  <div class="product-grid">
    <div class="product-card">
      <img src="/images/keychain.png" alt="Logo Keychain">
      <h3>Logo Keychain</h3>
      <p><span data-product-id="keychain"></span></p>
      <button onclick="addToCart('keychain', 'Seymour High Football', 'seymour-high-football-primary-0001')">
        Add to Cart
      </button>
    </div>

    <div class="product-card">
      <img src="/images/earrings.png" alt="Logo Earrings">
      <h3>Logo Earrings</h3>
      <p><span data-product-id="earrings"></span></p>
      <button onclick="addToCart('earrings', 'Seymour High Football', 'seymour-high-football-primary-0001')">
        Add to Cart
      </button>
    </div>

    <div class="product-card">
      <img src="/images/tshirt.png" alt="Team T‑Shirt">
      <h3>Team T‑Shirt</h3>
      <p><span data-product-id="tshirt"></span></p>
      <button onclick="addToCart('tshirt', 'Seymour High Football', 'seymour-high-football-primary-0001')">
        Add to Cart
      </button>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>© 2026 Seymour.Ink — Seymour, Indiana</p>
  <nav class="footer-nav">
    <a href="/search">Find Your School</a>
    <a href="/add-team">Add Your Team</a>
    <a href="mailto:hello@seymour.ink">Contact</a>
  </nav>
</footer>

<script type="module">
  import { computePrice } from "/pricing.js";

  const logoId = "seymour-high-football-primary-0001";
  const cfg = window.LOGO_CONFIG[logoId] || { tier: "standard", victoryDiscount: 0 };

  function priceLabel(productId) {
    const p = window.PRODUCTS[productId];
    if (!p) return "$0.00";
    const final = computePrice(p.basePrice, cfg.tier, cfg.victoryDiscount);
    return "$" + (final / 100).toFixed(2);
  }

  window.renderTeamPage = function () {
    document.querySelectorAll("[data-product-id]").forEach(el => {
      const id = el.getAttribute("data-product-id");
      el.textContent = priceLabel(id);
    });

    if (cfg.victoryDiscount > 0) {
      document.getElementById("victoryBadge").hidden = false;
    }
  };
</script>

</body>
</html>
