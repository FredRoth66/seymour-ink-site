<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Columbus Power Elite – Logo 0001</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      text-align: center;
      padding: 20px;
    }

    header {
      margin-bottom: 30px;
    }

    img.logo {
      width: 280px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    .links {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    a.button {
      display: block;
      padding: 12px 18px;
      background: #ffffff;
      border-radius: 10px;
      text-decoration: none;
      color: #222;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: transform 0.15s ease;
    }

    a.button:hover {
      transform: scale(1.03);
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <h1>Columbus Power Elite – Logo 0001</h1>
  </header>

  <img src="logo.webp" alt="Columbus Power Elite Logo 0001" class="logo" />

  <div class="links">
    <a class="button" href="products/">View Products</a>
    <a class="button" href="../">Back to Logos</a>
    <a class="button" href="../../">Back to Columbus Power Elite</a>
  </div>

  <footer>
    © Columbus Power Elite
  </footer>

</body>
</html>
