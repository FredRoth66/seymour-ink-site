<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Columbus Power Elite</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      text-align: center;
      padding: 20px;
    }

    header {
      margin-bottom: 30px;
    }

    img.logo-main {
      width: 220px;
      height: auto;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <img src="logo-main.png" alt="Columbus Power Elite Logo" class="logo-main" />
    <h1>Columbus Power Elite</h1>
  </header>

  <div class="grid">

    <a class="card" href="cheer/index.html">
      <img src="logo-cheer.webp" alt="Cheer Logo" />
      <h3>Cheer Program</h3>
      <p>View cheer apparel and merch</p>
    </a>

    <a class="card" href="logos/">
      <img src="logo-main.png" alt="Logos" />
      <h3>Team Logos</h3>
      <p>Download or view team branding</p>
    </a>

  </div>

  <footer>
    © Columbus Power Elite
  </footer>

</body>
</html>
