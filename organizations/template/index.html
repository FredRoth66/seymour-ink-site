<!DOCTYPE html>
<html>
<head>
  <title>School Logos — Seymour.Ink</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="site-header">
  <a href="/" class="logo-link">
    <img src="/images/seymour-ink-logo.png" alt="Seymour.Ink" class="site-logo">
  </a>
  <nav class="site-nav">
    <a href="/">About</a>
    <a href="/search">Find Your School</a>
    <a href="/add-team">Add Your Team</a>
    <a href="/cart">Cart</a>
  </nav>
</header>

<main class="main-content">
  <section class="school-header">
    <img src="/schools/template/logo-main.png" alt="School Logo">
    <h1>School Name</h1>
    <p>Select a logo below to view merch for that team or mark.</p>
  </section>

  <div class="logo-grid">
    <a class="logo-card" href="/schools/template/team-template">
      <img src="/schools/template/logo-primary.png" alt="Primary Logo">
      <span>Primary Logo</span>
    </a>

    <a class="logo-card" href="/schools/template/team-template">
      <img src="/schools/template/logo-football.png" alt="Football Logo">
      <span>Football</span>
    </a>
  </div>
</main>

<footer class="site-footer">
  <p>© 2026 Seymour.Ink — Seymour, Indiana</p>
  <nav class="footer-nav">
    <a href="/search">Find Your School</a>
    <a href="/add-team">Add Your Team</a>
    <a href="mailto:hello@seymour.ink">Contact</a>
  </nav>
</footer>

</body>
</html>
