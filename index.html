<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seymour.Ink – Custom Printing & Merch</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    header img {
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }

    .services {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .services img {
      width: 180px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: transform 0.15s ease;
    }

    .services img:hover {
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      margin: 40px 0 20px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <img src="/images/storefront.webp" alt="Seymour.Ink Storefront" />
  </header>

  <div class="content">
    <h1>Welcome to Seymour.Ink</h1>
    <p>
      We are a micro‑manufacturing studio specializing in custom merch, UV printing,
      3D printing, and school/team branding. Everything is produced in‑house with
      precision, care, and fast turnaround for local programs.
    </p>

    <div class="services">
      <a href="/3d-printing.html">
        <img src="/images/3d-printing.webp" alt="3D Printing" />
      </a>

      <a href="/uv-printing.html">
        <img src="/images/uv-printing.webp" alt="UV Printing" />
      </a>
    </div>
  </div>

  <footer>
    <a href="/schools/columbus-power-elite/" style="color:#333;">test</a>
  </footer>

</body>
</html>
