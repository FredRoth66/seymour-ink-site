<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/styles.css">

  <style>
    /* GLOBAL TYPOGRAPHY + LAYOUT FIX */
    body {
      font-family: system-ui, sans-serif;
      padding: 28px;
      max-width: 800px;
      margin: auto;
      font-size: 1.7rem; /* 1/3 larger */
      line-height: 1.8;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 2.5rem;
      margin-top: 2.4rem;
      margin-bottom: 1rem;
    }

    label.big-text {
      font-size: 1.9rem;
      display: block;
      margin: 1.4rem 0;
    }

    .learn-more a {
      font-size: 1.5rem;
    }

    /* INPUT FIELDS */
    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      font-size: 1.65rem;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .small-note {
      font-size: 1.5rem;
      opacity: 0.75;
    }

    /* IMAGE + VIDEO RESPONSIVE FIX */
    img, video {
      width: 100%;
      height: auto;
      max-width: 480px; /* 1/8 smaller than 550px */
      display: block;
      margin: 1.6rem auto;
      border-radius: 12px;
    }

    /* EXTRA SPACE BELOW FIRST CONSENT */
    #permission1 {
      margin-bottom: 4rem;
    }
