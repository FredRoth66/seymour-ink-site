<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consent</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: auto;
      line-height: 1.6;
    }

    h2 {
      font-size: 1.6rem;
      margin-top: 2rem;
    }

    label.big-text {
      font-size: 1.25rem;
      display: block;
      margin: 1rem 0;
    }

    .learn-more a {
      font-size: 1.1rem;
      display: inline-block;
      margin: 4px 0;
    }

    /* In-use image */
    #inUseImage {
      width: 100%;
      max-width: 700px;
      display: block;
      margin: 1rem auto;
      border-radius: 8px;
    }

    /* Full-size responsive video */
    #polaroidVideo {
      width: 100%;
      max-width: 700px;
      border-radius: 8px;
      display: block;
      margin: 1rem auto;
    }

    /* Submit button */
    #submitBtn {
      margin-top: 40px;
      width: 100%;
      padding: 16px;
      font-size: 1.4rem;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- PERMISSION #1 — ORDER PERMISSION -->
  <section id="permission1">
    <h2>Order Permission</h2>
    <label class="big-text">
      <input type="checkbox" id="order_permission">
      I approve this order for production.
    </label>
  </section>

  <!-- IN-USE IMAGE + VIDEO (revealed after #1) -->
  <section id="mediaSection" style="display:none;">
    <img id="inUseImage"
      src="/organizations/columbus-power-elite/logos/columbus-power-elite-0001/in-use.png"
      alt="Product In Use">

    <video id="polaroidVideo" autoplay loop muted playsinline>
      <source src="/organizations/columbus-power-elite/logos/columbus-power-elite-0001/polor.mp4" type="video/mp4">
    </video>
  </section>

  <!-- PERMISSION #2 — STORE SETUP PERMISSION -->
  <section id="permission2" style="display:none;">
    <h2>Permission to Set Up Your Store</h2>
    <label class="big-text">
      <input type="checkbox" id="store_permission">
      With your permission, we can set up a store for your organization with additional branded products.
    </label>

    <div class="learn-more">
      <a href="/contracts/earnings-and-tiers.html" target="_blank">Earnings & Tiers</a><br>
      <a href="/contracts/store-credit-policy.html" target="_blank">Store Credit Policy</a><br>
      <a href="/contracts/learn-marketing-permission.html" target="_blank">How Store Setup Works</a>
    </div>
  </section>

  <!-- SUBMIT BUTTON -->
  <button id="submitBtn" style="display:none;">Submit</button>

  <script>
    /* Smooth scroll with adjustable speed */
    function smoothScrollTo(targetY, duration = 900) {
      const startY = window.scrollY;
      const diff = targetY - startY;
      let start;

      function step(timestamp) {
        if (!start) start = timestamp;
        const time = timestamp - start;
        const percent = Math.min(time / duration, 1);

        window.scrollTo(0, startY + diff * percent);

        if (time < duration) {
          requestAnimationFrame(step);
        }
      }

      requestAnimationFrame(step);
    }

    function scrollToSection(id, speed = 900) {
      const el = document.getElementById(id);
      if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 20;
        smoothScrollTo(y, speed);
      }
    }

    /* Reveal logic */
    const orderBox = document.getElementById('order_permission');
    const storeBox = document.getElementById('store_permission');

    orderBox.addEventListener('change', () => {
      const media = document.getElementById('mediaSection');
      const perm2 = document.getElementById('permission2');

      if (orderBox.checked) {
        media.style.display = 'block';
        perm2.style.display = 'block';

        // Scroll past the image + video
        scrollToSection('permission2', 900);
      } else {
        media.style.display = 'none';
        perm2.style.display = 'none';
      }
    });

    storeBox.addEventListener('change', () => {
      const submit = document.getElementById('submitBtn');
      submit.style.display = storeBox.checked ? 'block' : 'none';

      if (storeBox.checked) {
        scrollToSection('submitBtn', 900);
      }
    });
  </script>

</body>
</html>
