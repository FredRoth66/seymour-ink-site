<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>Order Approval & Consent – Seymour.Ink</title> <link rel="stylesheet" href="/styles.css">

<style> /* GLOBAL TYPOGRAPHY + CENTER ALIGNMENT */ body { font-family: system-ui, sans-serif; padding: 32px; max-width: 800px; margin-left: auto; margin-right: auto; font-size: 2.5rem; line-height: 1.8; text-align: justify; text-align-last: center; }

h1 {
  font-size: 3.8rem;
  margin-bottom: 1.4rem;
  text-align: center;
  font-weight: 700;
}

h2 {
  font-size: 3.2rem;
  margin-top: 2.8rem;
  margin-bottom: 1.4rem;
  text-align: center;
  font-weight: 700;
}

/* ORDER APPROVAL SHOULD BE BIGGER */
#permission1 h2 {
  font-size: 3.6rem;
  font-weight: 800;
}

p, label, .learn-more, button {
  text-align: center;
}

label.big-text {
  font-size: 3rem;
  display: block;
  margin: 1.8rem 0;
  font-weight: 800;
}

.learn-more a {
  font-size: 2.6rem;
  font-weight: 700;
}

/* INPUT FIELDS */
input[type="text"],
input[type="email"],
input[type="tel"] {
  width: 100%;
  padding: 22px;
  margin-top: 14px;
  font-size: 2.8rem;
  border-radius: 14px;
  border: 1px solid #ccc;
  text-align: center;
  font-weight: 600;
}

.small-note {
  font-size: 2.6rem;
  opacity: 0.85;
  margin-top: 1.2rem;
  text-align: center;
  font-weight: 800;
}

/* EXTRA‑BIG CHECKBOXES */
input[type="checkbox"] {
  width: 36px;
  height: 36px;
  transform: scale(2.2);
  accent-color: black;
  margin-right: 26px;
}

/* IMAGE + VIDEO RESPONSIVE FIX */
img, video {
  width: 100%;
  height: auto;
  max-width: 440px;
  display: block;
  margin: 2.4rem auto;
  border-radius: 16px;
}

/* COST BREAKDOWN TEXT */
.cost-line {
  font-size: 3rem;
  margin: 0.5rem 0;
  font-weight: 800;
}

/* EXTRA SPACE BELOW FIRST CONSENT */
#permission1 {
  margin-bottom: 5rem;
  padding: 1.4rem 0;
}

/* SUBMIT BUTTON */
#submitBtn {
  margin-top: 80px;
  width: 100%;
  padding: 30px;
  font-size: 3rem;
  background: black;
  color: white;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  display: none;
  text-align: center;
  font-weight: 800;
}

/* EXTRA PADDING BELOW SUBMIT */
#bottomPadding {
  height: 220px;
}

/* DIMMED CONSENT */
.dimmed {
  opacity: 0.35;
  pointer-events: none;
}

/* MOBILE TUNING */
@media (max-width: 480px) {
  body {
    padding: 40px;
    font-size: 2.7rem;
  }

  h1 {
    font-size: 4rem;
  }

  h2 {
    font-size: 3.4rem;
  }

  label.big-text {
    font-size: 3.2rem;
  }

  img, video {
    max-width: 82%;
  }
}

</style> </head>

<body class="white-bg"> <header class="site-header"> <a href="/"><img src="/images/seymour-ink-logo.png" class="site-logo" alt="Seymour.Ink logo"></a> </header>

<main class="consent-container">

<h1 style="text-align:center; margin-top: 2rem;">Order Approval and Permission</h1>

<section id="nameEntrySection" style="margin-top: 3rem; text-align: center;"> <p style="font-size: 2.8rem; font-weight: 700; margin-bottom: 1.6rem;">Please enter your name to find your order:</p> <input type="text" id="nameInput" placeholder="Your full name" style="font-size: 2.8rem; padding: 18px 22px; width: 100%; max-width: 400px; border-radius: 14px; border: 1px solid #ccc; text-align: center; font-weight: 600;"> <button id="searchNameBtn" style="margin-top: 2rem; font-size: 2.8rem; padding: 18px 30px; border-radius: 14px; background-color: black; color: white; border: none; cursor: pointer; font-weight: 800;">Search</button>

<script> document.getElementById('searchNameBtn').addEventListener('click', function() { const nameInput = document.getElementById('nameInput'); const nameError = document.getElementById('nameError'); const permissionSection = document.getElementById('permission1'); const nameValue = nameInput.value.trim();

if (!nameValue) {
  nameError.style.display = 'block';
  permissionSection.style.display = 'none';
  return;
}

nameError.style.display = 'none';
permissionSection.style.display = 'block';
// Scroll to the permission section
permissionSection.scrollIntoView({ behavior: 'smooth' });

}); </script> <p id="nameError" style="color: red; font-size: 2.4rem; margin-top: 1rem; display: none;">Please enter a name to continue.</p> </section>

<section id="permission1" style="display:none;"> <h2>Order Approval</h2>

<label id="orderPermissionLabel" class="dimmed big-text"> <input type="checkbox" id="order_permission" disabled> By selecting this box, you are granting us permission to produce this order. </label>

<p class="small-note">Phone number or email required before approving.</p>

<div class="learn-more"> <a href="/contracts/learn-order-permission.html" target="_blank">Learn more</a> </div> </section>

<!-- MEDIA SECTION (revealed after #1) --> <section id="mediaSection" style="display:none;"> <img id="inUseImage" src="/organizations/columbus-power-elite/logos/columbus-power-elite-0001/in-use.png" alt="Product In Use">

<video id="polaroidVideo" autoplay loop muted playsinline> <source src="/organizations/columbus-power-elite/logos/columbus-power-elite-0001/polor.mp4" type="video/mp4"> </video> </section>

<!-- PERMISSION #2 — OPTIONAL MARKETING --> <section id="permission2" style="display:none;"> <h2>Optional Marketing Permission</h2>

<label class="big-text"> <input type="checkbox" id="marketing_permission"> With your permission, we can set up a store for your organization with additional branded products. </label>

<div class="learn-more"> <a href="/contracts/earnings-and-tiers.html" target="_blank">Earnings & Tiers</a><br> <a href="/contracts/store-credit-policy.html" target="_blank">Store Credit Policy</a><br> <a href="/contracts/learn-marketing-permission.html" target="_blank">How Store Setup Works</a> </div> </section>

<!-- SUBMIT BUTTON --> <button id="submitBtn">Submit Approval</button> <div id="bottomPadding"></div>

</main>

<script> function smoothScrollTo(targetY, duration = 900) { const startY = window.scrollY; const diff = targetY - startY; let start;

function step(timestamp) {
  if (!start) start = timestamp;
  const time = timestamp - start;
  const percent = Math.min(time / duration, 1);

  window.scrollTo(0, startY + diff * percent);

  if (time < duration) requestAnimationFrame(step);
}

requestAnimationFrame(step);

}

function scrollToSection(id, speed = 900) { const el = document.getElementById(id); if (el) { const y = el.getBoundingClientRect().top + window.scrollY - 20; smoothScrollTo(y, speed); } }

function checkInvoiceFields() { const phone = document.getElementById('invoice_phone').value.trim(); const email = document.getElementById('invoice_email').value.trim(); const orderBox = document.getElementById('order_permission'); const label = document.getElementById('orderPermissionLabel');

if (phone || email) {
  orderBox.disabled = false;
  label.classList.remove('dimmed');
} else {
  orderBox.disabled = true;
  label.classList.add('dimmed');
}

}

document.getElementById('invoice_phone').addEventListener('input', checkInvoiceFields); document.getElementById('invoice_email').addEventListener('input', checkInvoiceFields);

const orderBox = document.getElementById('order_permission');

orderBox.addEventListener('change', () => { const media = document.getElementById('mediaSection'); const perm2 = document.getElementById('permission2'); const submit = document.getElementById('submitBtn');

if (orderBox.checked) {
  media.style.display = 'block';
  perm2.style.display = 'block';
  submit.style.display = 'block';
  scrollToSection('permission2', 900);
} else {
  media.style.display = 'none';
  perm2.style.display = 'none';
  submit.style.display = 'none';
}

}); </script>

</body> </html>
