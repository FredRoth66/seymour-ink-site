<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Seymour.Ink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="white-bg">

<header class="site-header">
  <img src="/images/seymour-ink-logo.png" class="site-logo" alt="Seymour.Ink logo">
</header>

<main class="standard-container">
  <h1>Contact Seymour.Ink</h1>
  <p>If you have questions about projects, school programs, or custom work, use this form.</p>

  <form id="contact-form" action="/api/contact" method="POST">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p id="form-status" class="small"></p>
</main>

<footer class="site-footer">
  <p><a href="/">Back to Home</a></p>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', async function (e) {
  e.preventDefault();

  const status = document.getElementById('form-status');
  status.textContent = 'Sending...';

  // Collect values
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  // Frontend validation
  if (!name || !email || !message) {
    status.textContent = 'Please fill out all fields.';
    return;
  }

  // Build payload
  const payload = { name, email, message };

  // Debug log (you can remove later)
  console.log("Sending payload:", payload);

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    // Handle response
    if (res.ok) {
      status.textContent = 'Message sent. Thank you.';
      this.reset();
    } else {
      const data = await res.json().catch(() => ({}));
      console.error("Server error:", data);
      status.textContent = data.error || 'There was a problem sending your message.';
    }
  } catch (err) {
    console.error("Fetch error:", err);
    status.textContent = 'There was a problem sending your message.';
  }
});
</script>

</body>
</html>
