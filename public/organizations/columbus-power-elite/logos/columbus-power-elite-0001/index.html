<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Columbus Power Elite – Merch</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 30px auto;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
    }

    .label {
      font-weight: bold;
    }

    a.back {
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Columbus Power Elite – Merch</h1>
  <p>Select an item below to view this logo on different products.</p>

  <div class="grid">
    <div class="card">
      <img src="earring.webp" alt="Earring" />
      <div class="label">Earrings</div>
    </div>

    <div class="card">
      <img src="keychain.webp" alt="Keychain" />
      <div class="label">Keychain</div>
    </div>

    <div class="card">
      <img src="necklase.webp" alt="Necklace" />
      <div class="label">Necklace</div>
    </div>
  </div>

  <a class="back" href="/schools/columbus-power-elite/">
    ← Back to Columbus Power Elite
  </a>

</body>
</html>
