<!DOCTYPE html>
<html>
<head>
  <title>Add Your School — Seymour.Ink</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="site-header">
  <a href="/" class="logo-link">
    <img src="/images/seymour-ink-logo.png" alt="Seymour.Ink" class="site-logo">
  </a>
  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/search">Search Schools</a>
    <a href="/cart">Cart</a>
  </nav>
</header>

<main class="main-content">
  <h1>Add Your School to the Program</h1>

  <p>Use this form to start the process of adding your school’s logo and merchandise.</p>

  <form>
    <label>School Name</label>
    <input type="text" required>

    <label>Contact Name</label>
    <input type="text" required>

    <label>Contact Email</label>
    <input type="email" required>

    <label>Role (e.g., PTO, coach, teacher)</label>
    <input type="text">

    <label>Notes</label>
    <textarea rows="4" placeholder="Tell us about your fundraiser or needs."></textarea>

    <p class="form-note">
      After submitting, we’ll follow up with a permission form and next steps.
    </p>

    <button type="submit" onclick="alert('This is a placeholder form. Wire this to email or a backend when ready.'); return false;">Submit</button>
  </form>
</main>

<footer class="site-footer">
  <p>© 2026 Seymour.Ink — Seymour, Indiana</p>
  <nav class="footer-nav">
    <a href="/search">Search Schools</a>
    <a href="/add-school">Add Your School</a>
    <a href="mailto:hello@seymour.ink">Contact</a>
  </nav>
</footer>

</body>
</html>
