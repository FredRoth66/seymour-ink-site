<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Your Organization – Seymour.Ink</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding-top: 40px;
    }

    .form-card {
      background: #fff;
      border: 2px solid #000;
      padding: 24px;
      margin-top: 20px;
    }

    .form-row {
      margin-bottom: 18px;
    }

    .form-row label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .form-row input[type="text"],
    .form-row input[type="email"],
    .form-row input[type="file"] {
      width: 100%;
      padding: 8px;
      border: 2px solid #000;
      background: #fdfdfd;
    }

    .helper-text {
      font-size: 0.9rem;
      color: #555;
      margin-top: 4px;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .note {
      font-size: 0.9rem;
      color: #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Wagon / Cart Icon (optional on this page) -->
  <div class="cart-icon">
    <a href="/cart/">
      <img src="/images/cart-wagon.png" alt="Cart">
    </a>
  </div>

  <div class="page-wrap">
    <h1>Add Your Organization</h1>
    <p>
      Share your logo and info below. We’ll review it, set up your merch by hand,
      and send you a link when it’s ready.
    </p>

    <div class="form-card">
      <form id="add-org-form">

        <div class="form-row">
          <label for="org-name">Organization name</label>
          <input type="text" id="org-name" name="orgName" required>
          <div class="helper-text">Example: Columbus Power Elite, Seymour Owls, etc.</div>
        </div>

        <div class="form-row">
          <label for="contact-name">Your name</label>
          <input type="text" id="contact-name" name="contactName" required>
        </div>

        <div class="form-row">
          <label for="contact-email">Email</label>
